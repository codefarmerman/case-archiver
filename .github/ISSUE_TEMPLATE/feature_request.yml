name: 💡 功能建议
description: 提出新功能或改进想法
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: 感谢你的想法！请说明使用场景，便于评估价值与优先级。
  - type: textarea
    id: problem
    attributes:
      label: 想解决什么问题 / 痛点
      description: 你在什么场景下遇到不便？
      placeholder: 归档大量材料时，希望……
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望的方案
      description: 你希望程序怎么做？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案 / 现有变通
      description: 是否有其他做法或临时变通？
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: 涉及范围
      multiple: true
      options:
        - 分类逻辑（13 项 / 关键词 / LLM）
        - 归档流程（重命名 / 排序 / 卷内目录）
        - 自动补写（代理词 / 办案小结）
        - 桌面 UI / 交互
        - 命令行
        - 隐私 / 安全
        - 多格式提取（pdf/docx/ofd…）
        - 其他
    validations:
      required: false
  - type: checkboxes
    id: confirm
    attributes:
      label: 确认
      options:
        - label: 我已搜索过现有 Issue，未发现重复
          required: true
